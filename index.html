<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Typing Trainer</h1>

    <div class="settings">
      <label>
        Number of words:
        <select id="wordCountSelect">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>
      </label>

      <label>
        Difficulty:
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </label>
    </div>

    <div class="game">
      <div class="current-word-box">
        <span id="currentWord">Press "Start"</span>
      </div>

      <input
        type="text"
        id="userInput"
        placeholder="Type the word here and press Enter"
        autocomplete="off"
        disabled
      />

      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="resetBtn" disabled>Reset</button>
      </div>
    </div>

    <div class="stats">
      <div>
        <strong>Words done:</strong>
        <span id="wordsDone">0</span>/<span id="wordsTotal">0</span>
      </div>
      <div><strong>Correct:</strong> <span id="correctCount">0</span></div>
      <div><strong>Wrong:</strong> <span id="wrongCount">0</span></div>
      <div><strong>Time:</strong> <span id="timeElapsed">0.0</span> s</div>
      <div><strong>Accuracy:</strong> <span id="accuracy">0</span>%</div>
      <div><strong>Average time per word:</strong> <span id="avgTime">0.0</span> s</div>
    </div>

    <div class="result-message" id="resultMessage"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
