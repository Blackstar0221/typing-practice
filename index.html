<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1 id="titleText">Typing Trainer</h1>

      <div class="lang-toggle">
        <span id="langLabelEn" class="lang-label active">EN</span>
        <label class="switch">
          <input type="checkbox" id="langToggle">
          <span class="slider"></span>
        </label>
        <span id="langLabelKo" class="lang-label">KR</span>
      </div>
    </div>

    <div class="settings">
      <label>
        <span id="wordCountLabel">Number of words:</span>
        <select id="wordCountSelect">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>
      </label>

      <label>
        <span id="difficultyLabel">Difficulty:</span>
        <select id="difficultySelect">
          <option value="easy" id="diffEasy">Easy</option>
          <option value="medium" id="diffMedium">Medium</option>
          <option value="hard" id="diffHard">Hard</option>
        </select>
      </label>
    </div>

    <div class="game">
      <div class="current-word-box">
        <span id="currentWord">Press "Start"</span>
      </div>

      <input
        type="text"
        id="userInput"
        placeholder="Type the word here and press Enter"
        autocomplete="off"
        disabled
      />

      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="resetBtn" disabled>Reset</button>
      </div>
    </div>

    <div class="stats">
      <div>
        <strong id="progressLabel">Words done:</strong>
        <span id="wordsDone">0</span>/<span id="wordsTotal">0</span>
      </div>
      <div><strong id="correctLabel">Correct:</strong> <span id="correctCount">0</span></div>
      <div><strong id="wrongLabel">Wrong:</strong> <span id="wrongCount">0</span></div>
      <div><strong id="timeLabel">Time:</strong> <span id="timeElapsed">0.0</span> s</div>
      <div><strong id="accuracyLabel">Accuracy:</strong> <span id="accuracy">0</span>%</div>
      <div><strong id="avgTimeLabel">Average time per word:</strong> <span id="avgTime">0.0</span> s</div>
    </div>

    <div class="result-message" id="resultMessage"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
